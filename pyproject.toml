[project]
name = "datadex-pokemon-lab"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "dash ~= 2.17.0",
    "plotly ~= 5.24.0",
    "dash-mantine-components ~= 0.14.0",
    "pandas ~= 2.2.0",
    "pyarrow ~= 17.0.0",
    "requests ~= 2.32.0",
    "loguru>=0.7.3",
]

[dependency-groups]
dev = [
    "pandas-stubs>=3.0.0.260204",
    "types-requests>=2.32.4.20260107",
    "pytest>=8.0.0",
    "pytest-mock>=3.14.0",
    "ruff>=0.15.5",
    "mypy>=1.19.1",
]
[tool.mypy]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = [
    "plotly.*",
    "dash.*",
]
ignore_missing_imports = true
